function searchLocalDB(query) {
  if (!query || query.length < 1) return [];
  var q = query.trim().toLowerCase();
  var qNoSpace = q.replace(/\s+/g, "");
  var abbrev = {
    "강원": "강원도", "경기": "경기도", "충북": "충청북도",
    "충남": "충청남도", "전북": "전라북도", "전남": "전라남도",
    "경북": "경상북도", "경남": "경상남도", "제주": "제주도",
  };
  var expanded = abbrev[qNoSpace] || null;
  var results = LOC_DB.filter(function(loc) {
    var hay = (loc.name + " " + loc.nameEn + " " + loc.region + " " + loc.tags).toLowerCase().replace(/\s+/g, "");
    if (expanded && hay.includes(expanded.toLowerCase())) return true;
    return hay.includes(qNoSpace);
  });
  results.sort(function(a, b) {
    var aName = a.name.toLowerCase();
    var bName = b.name.toLowerCase();
    var aStart = aName.startsWith(q) ? 0 : aName.includes(q) ? 1 : 2;
    var bStart = bName.startsWith(q) ? 0 : bName.includes(q) ? 1 : 2;
    return aStart - bStart;
  });
  return results.slice(0, 8);
}

async function _searchViaEdge(brand) {

    method: "POST",
    headers: { "Content-Type":"application/json", "apikey":SUPA_KEY, "Authorization":"Bearer "+SUPA_KEY },

  if (!res.ok) throw new Error("Edge " + res.status);
  var data = await res.json();

}

// STEP 3: Gemini로 장비 스펙 생성 (브랜드 공식 라인업 추정)
async function _searchViaGemini(brand) {
  var prompt = "아웃도어 브랜드 \"" + brand + "\"의 대표 캠핑/등산 장비 목록을 JSON으로 알려줘.\n" +
    "반드시 아래 형식만 출력하고 설명 없이 JSON 배열만 반환:\n" +
    '[{"name":"제품명","brand":"' + brand + '","weight_g":숫자,"cat":"Shelter|Sleep|Cooking|Pack|Clothing|ETC","specs":"간단한 스펙"}]\n' +
    "최대 8개, 실제 존재하는 제품만. JSON 외 텍스트 금지.";
  try {
    var result = await callLLM({ messages:[{role:"user",content:prompt}], max_tokens:800 });
    var text = (result.content[0] && result.content[0].text) || "";
    // JSON 추출 (마크다운 코드블록 제거)
    var jsonMatch = text.match(/\[[\s\S]*\]/);
    if (!jsonMatch) return null;
    var items = JSON.parse(jsonMatch[0]);
    if (!Array.isArray(items) || items.length === 0) return null;
    // 브랜드명이 검색어와 일치하지 않는 결과 필터링
    var brandLower = brand.toLowerCase();
    var filtered = items.filter(function(i) {
      if (!i.brand) return false;
      var ib = String(i.brand).toLowerCase();
      return ib.includes(brandLower) || brandLower.includes(ib.split(" ")[0]);
    });
    if (filtered.length === 0) filtered = items; // 전부 필터링되면 원본 유지
    return filtered.map(function(i) { return _mapGearItem(i, brand, false); });
  } catch(e) { return null; }
}

  var missingRec=[];
  if(!hasCat["Tent"]&&!hasCat["Shelter"]) missingRec.push({cat:"Tent",prod:"텐트",brand:"추천",wg:1000,score:90,reason:"텐트/쉘터가 없습니다",price:""});
  if(!hasCat["Sleep"])   missingRec.push({cat:"Sleep",prod:"침낭",brand:"추천",wg:500,score:85,reason:"침낭이 없습니다",price:""});
  if(!hasCat["Cooking"]) missingRec.push({cat:"Cooking",prod:"버너",brand:"추천",wg:100,score:80,reason:"취사 도구가 없습니다",price:""});
  var warnings=[];
  if(tn<0) warnings.push("야간 "+tn+"°C — 동계 장비 필수");
  if(wind>=10) warnings.push("강풍 "+wind+"m/s — 팩 전체 고정 필수");
  if(rain>=60) warnings.push("강수 "+rain+"% — 방수 타프 필수");
  gearCheck.sort(function(a,b){return (b.score||50)-(a.score||50);});
  return { gearCheck:gearCheck, warnings:warnings, missingRec:missingRec, isLocal:true };
}

async function callLLM(body) {
  var ctrl = new AbortController();
  var tid = setTimeout(function() { ctrl.abort(); }, 30000);
  var userMsg = "";
  if (body.messages && body.messages.length > 0) {
    userMsg = body.messages.map(function(m) { return m.content; }).join("\n");
  }
  if (body.system) userMsg = body.system + "\n\n" + userMsg;
  var geminiBody = {
    contents: [{ parts: [{ text: userMsg }] }],
    generationConfig: { maxOutputTokens: body.max_tokens || 1000, temperature: 0.3 },
  };
  try {
    var models = ["gemini-2.0-flash", "gemini-2.0-flash-lite", "gemini-1.5-flash-002", "gemini-1.0-pro"];
    var res = null;
    for (var mi = 0; mi < models.length; mi++) {
      var url = "https://generativelanguage.googleapis.com/v1beta/models/" + models[mi] + ":generateContent";
      try {
        res = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json", "x-goog-api-key": GEMINI_KEY }, body: JSON.stringify(geminiBody), signal: ctrl.signal });
        if (res.status === 429 && mi < models.length-1) { res = null; await new Promise(function(r){setTimeout(r,1000);}); continue; }
        break;
      } catch(fe) { if (mi < models.length-1) continue; throw fe; }
    }
    clearTimeout(tid);
    if (!res || !res.ok) {
      var et = res ? await res.text().catch(function(){return "";}) : "";
      throw new Error("Gemini " + (res?res.status:0) + ": " + et.slice(0,80));
    }
    var data = await res.json();
    var text = "";
    try { text = data.candidates[0].content.parts[0].text; } catch(e) { text = ""; }
    return { content: [{ type: "text", text: text }] };
  } catch(e) {
    clearTimeout(tid);
    if (e.name === "AbortError") throw new Error("시간 초과");
    throw e;
  }
}

function useLocalStorage(key, initial) {
  var init = useState(function() {
    try {
      var raw = localStorage.getItem(key);
      return raw !== null ? JSON.parse(raw) : initial;
    } catch (e) { return initial; }
  });
  var val = init[0];
  var setVal = init[1];
  var set = useCallback(function(next) {
    setVal(function(prev) {
      var r = typeof next === "function" ? next(prev) : next;
      try { localStorage.setItem(key, JSON.stringify(r)); } catch (e) {}
      return r;
    });
  }, [key]);
  return [val, set];
}

async function geocode(query) {
  if (!query || query.length < 1) return [];
  var localResults = searchLocalDB(query);
  var owmResults = [];
  for (var ki = 0; ki < OWM_KEYS.length; ki++) {
    try {
      var url = "https://api.openweathermap.org/geo/1.0/direct?q=" +
        encodeURIComponent(query) + "&limit=5&appid=" + OWM_KEYS[ki];
      var res = await fetch(url);
      if (!res.ok) continue;
      var list = await res.json();
      if (list && list.length > 0) {
        owmResults = list.map(function(item) {
          return {
            name: item.local_names && item.local_names.ko ? item.local_names.ko : item.name,
            nameEn: item.name, country: item.country,
            state: item.state || "", region: item.state || "",
            lat: item.lat, lon: item.lon, tags: "",
          };
        });
        break;
      }
    } catch (ge) { continue; }
  }
  var combined = localResults.slice();
  owmResults.forEach(function(owm) {
    var isDup = combined.some(function(loc) {
      return Math.abs(loc.lat - owm.lat) < 0.15 && Math.abs(loc.lon - owm.lon) < 0.15;
    });
    if (!isDup) {
      // OWM 결과에 state 없으면 localDB에서 가까운 지역 state 보강
      if (!owm.state) {
        var nearby = localResults.find(function(loc) {
          return Math.abs(loc.lat - owm.lat) < 0.5 && Math.abs(loc.lon - owm.lon) < 0.5;
        });
        if (nearby && nearby.state) owm.state = nearby.state;
      }
      combined.push(owm);
    }
  });
  return combined.slice(0, 8);
}

var WX_CACHE = {};
var CACHE_MS = 5 * 60 * 1000;

async function fetchWeatherWithKey(loc, key) {
  var ctrl = new AbortController();
  var tid  = setTimeout(function() { ctrl.abort(); }, 9000);
  try {
    var qs = "&appid=" + key + "&units=metric&lang=kr";
    var base = "https://api.openweathermap.org/data/2.5/";
    var results = await Promise.all([
      fetch(base + "weather?lat=" + loc.lat + "&lon=" + loc.lon + qs, { signal: ctrl.signal }),
      fetch(base + "forecast?lat=" + loc.lat + "&lon=" + loc.lon + "&cnt=8" + qs, { signal: ctrl.signal }),
    ]);
    clearTimeout(tid);
    var cr = results[0]; var fr = results[1];
    if (!cr.ok) throw new Error("HTTP_" + cr.status);
    var parsed = await Promise.all([cr.json(), fr.ok ? fr.json() : null]);
    var cd = parsed[0]; var fd = parsed[1];
    var wid = cd.weather[0].id;
    var tzOff = cd.timezone;
    var nowLoc = new Date((Date.now() / 1000 + tzOff) * 1000);
    var timeStr = nowLoc.toISOString().slice(11, 16) + " (현지)";
    var tdMax = cd.main.temp_max; var tnMin = cd.main.temp_min;
    if (fd && fd.list) {
      var todayStr = new Date((fd.list[0].dt + tzOff) * 1000).toISOString().slice(0, 10);
      fd.list.forEach(function(item) {
        var dStr = new Date((item.dt + tzOff) * 1000).toISOString().slice(0, 10);
        if (dStr === todayStr) {
          if (item.main.temp_max > tdMax) tdMax = item.main.temp_max;
          if (item.main.temp_min < tnMin) tnMin = item.main.temp_min;
        }
      });
    }
    var rainP = (fd && fd.list && fd.list[0])
      ? Math.round((fd.list[0].pop || 0) * 100)
      : (wid >= 200 && wid < 700 ? 70 : Math.round(cd.clouds.all * 0.4));
    return {
      ok: true, src: "OWM",
      label: loc.name + (loc.country ? ", " + loc.country : ""),
      lat: loc.lat, lon: loc.lon,
      temp: Math.round(cd.main.temp), feels: Math.round(cd.main.feels_like),
      hum: cd.main.humidity, wind: Math.round(cd.wind.speed * 10) / 10,
      rain: rainP, cond: owmCond(wid),
      tn: Math.round(tnMin), td: Math.round(tdMax), time: timeStr,
    };
  } catch (e) {
    clearTimeout(tid);
    throw e;
  }
}

async function fetchWeather(loc) {
  if (!loc) return Object.assign({}, MOCK_WX);
  var cacheKey = loc.lat + "," + loc.lon;
  var hit = WX_CACHE[cacheKey];
  if (hit && Date.now() - hit.ts < CACHE_MS) return Object.assign({}, hit.data, { cached: true });
  var lastErr = null;
  for (var ki = 0; ki < OWM_KEYS.length; ki++) {
    try {
      var data = await fetchWeatherWithKey(loc, OWM_KEYS[ki]);
      WX_CACHE[cacheKey] = { data: JSON.parse(JSON.stringify(data)), ts: Date.now() };
      return data;
    } catch (e) { lastErr = e.message; continue; }
  }
  var stale = WX_CACHE[cacheKey];
  if (stale) return Object.assign({}, stale.data, { cached: true, src: "Cache" });
  return Object.assign({}, MOCK_WX, {
    label: loc.name + (loc.country ? ", " + loc.country : ""),
    src: "Mock",
  });
}

function localTip(w) {

async function runAIAnalysis(locLabel, campStyle, wx, gear) {
  var w = wx && wx.ok ? wx : null;
  var temp = w ? w.temp : 15; var tn = w ? w.tn : 8;
  var td = w ? w.td : 22; var wind = w ? w.wind : 3; var rain = w ? w.rain : 10;
  var gearLines = gear.map(function(g, i) {
    var tmp = (g.cat === "Sleep" && g.optTemp !== undefined) ? " opt:" + g.optTemp + "C" : "";
    return (i + 1) + ". " + g.n + " [" + g.cat + "/" + g.wc + "/" + g.wg + "g" + tmp + "]";
  }).join("\n");
  var catW = {};
  gear.forEach(function(g) { catW[g.cat] = (catW[g.cat] || 0) + g.wg; });
  var baseKg = ((catW["Tent"] || 0) + (catW["Shelter"] || 0) + (catW["Sleep"] || 0) + (catW["Cooking"] || 0) + (catW["Bag"] || 0)) / 1000;
  var totalKg = gear.reduce(function(a, g) { return a + g.wg; }, 0) / 1000;
  var hasCat = {}; gear.forEach(function(g) { hasCat[g.cat] = true; });
  var missing = ["Tent","Sleep","Clothing","Cooking"].filter(function(c) { return !hasCat[c]; });
  var prompt = [
    "You are a pro camping gear analyst. Respond ONLY with valid JSON, no markdown.",
    "Fields: gearCheck(array), warnings(array), missingRec(array).",
    "gearCheck item: n(string), ok(bool), score(1-100), reason(Korean).",
    "missingRec item: cat, prod, brand, wg(number), score(1-100), reason(Korean), price.",
    "Sort both arrays by score DESC. All reason/warning text in Korean.",
    "Backpacking prefers base weight under 9kg. AutoCamp: comfort OK.",
    "For insulation gear recommend: 10D nylon, Hungarian goose down 270g, minimal design.",
    "",
    "Location: " + locLabel + " | Style: " + campStyle,
    "Weather: " + temp + "C now / " + tn + "C night / " + td + "C day / " + wind + "m/s wind / " + rain + "% rain",
    "Base: " + baseKg.toFixed(1) + "kg | Total: " + totalKg.toFixed(1) + "kg",
    "Missing cats: " + (missing.length ? missing.join(", ") : "none"),
    "",
    "Gear:",
    gearLines,
    "",
    "JSON only:",
  ].join("\n");
  var d = await callLLM({
    model: "claude-3-5-sonnet-20241022", max_tokens: 2000,
    messages: [{ role: "user", content: prompt }],
  });
  var txt = (d.content && d.content[0] && d.content[0].text) ? d.content[0].text : "";
  var tb = String.fromCharCode(96, 96, 96);
  txt = txt.split(tb + "json").join("").split(tb).join("");
  txt = txt.replace(/[\u201C\u201D]/g, '"').replace(/[\u2018\u2019]/g, "'");
  var si = txt.indexOf("{"); var ei = txt.lastIndexOf("}");
  if (si === -1 || ei <= si) throw new Error("AI가 JSON을 반환하지 않았습니다");
  var js = txt.slice(si, ei + 1);
  js = js.replace(/,(\s*[}\]])/g, "$1").replace(/,(\s*,)/g, ",");
  var result;
  try {
    result = JSON.parse(js);
  } catch (err1) {
    result = { gearCheck: [], warnings: [], missingRec: [] };
    try {
      var gcM = js.match(/"gearCheck"\s*:\s*(\[[\s\S]*?\])[\s,}]/);
      if (gcM) result.gearCheck = JSON.parse(gcM[1].replace(/,(\s*[}\]])/g, "$1"));
    } catch (e) {}
    try {
      var wnM = js.match(/"warnings"\s*:\s*(\[[\s\S]*?\])[\s,}]/);
      if (wnM) result.warnings = JSON.parse(wnM[1].replace(/,(\s*[}\]])/g, "$1"));
    } catch (e) {}
    try {
      var mrM = js.match(/"missingRec"\s*:\s*(\[[\s\S]*?\])[\s,}]/);
      if (mrM) result.missingRec = JSON.parse(mrM[1].replace(/,(\s*[}\]])/g, "$1"));
    } catch (e) {}
    if (!result.gearCheck.length && !result.missingRec.length) {
      throw new Error("AI 응답 파싱 실패: " + err1.message.slice(0, 60));
    }
  }
  if (!Array.isArray(result.gearCheck)) result.gearCheck = [];
  if (!Array.isArray(result.warnings)) result.warnings = [];
  if (!Array.isArray(result.missingRec)) result.missingRec = [];
  result.gearCheck.sort(function(a, b) { return (b.score || 50) - (a.score || 50); });
  result.missingRec.sort(function(a, b) { return (b.score || 50) - (a.score || 50); });
  return result;
}

function buildChecklist(wx, wr, rr, sleepGear) {
  var items = [];

function compressImage(dataUrl, maxPx) {
  return new Promise(function(resolve) {
    try {
      var img = new window.Image();
      img.onload = function() {
        var ratio = Math.min(1, maxPx / Math.max(img.width, img.height));
        var canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * ratio);
        canvas.height = Math.round(img.height * ratio);
        var ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", 0.72));
      };
      img.onerror = function() { resolve(dataUrl); };
      img.src = dataUrl;
    } catch (e) { resolve(dataUrl); }
  });
}

function getCalDays(year, month) {
  var first = new Date(year, month, 1);
  var last  = new Date(year, month + 1, 0);
  var days  = [];
  for (var i = 0; i < first.getDay(); i++) days.push(null);
  for (var d = 1; d <= last.getDate(); d++) days.push(d);
  return days;
}
